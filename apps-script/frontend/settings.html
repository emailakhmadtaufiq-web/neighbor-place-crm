<section id="settingsPage" class="page" style="display:none;">

    <div class="topbar">

        <div>

            <h2>Settings</h2>

            <small>Konfigurasi Neighbor Place CRM</small>

        </div>

        <button
            class="btn btn-success"
            onclick="saveSettings()">

            <i class="bi bi-floppy"></i>

            Simpan

        </button>

    </div>

    <div class="row">

        <div class="col-lg-6">

            <div class="table-card">

                <h5 class="mb-4">

                    Informasi Bisnis

                </h5>

                <div class="mb-3">

                    <label class="form-label">

                        Nama Bisnis

                    </label>

                    <input
                        id="businessName"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Nomor Telepon

                    </label>

                    <input
                        id="businessPhone"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Alamat

                    </label>

                    <textarea
                        id="businessAddress"
                        rows="3"
                        class="form-control"></textarea>

                </div>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="table-card">

                <h5 class="mb-4">

                    Loyalty Rules

                </h5>

                <div class="mb-3">

                    <label class="form-label">

                        Reward Target

                    </label>

                    <input
                        id="settingReward"
                        type="number"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Gold Target

                    </label>

                    <input
                        id="settingGold"
                        type="number"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Platinum Target

                    </label>

                    <input
                        id="settingPlatinum"
                        type="number"
                        class="form-control">

                </div>

            </div>

        </div>

    </div>

</section>
