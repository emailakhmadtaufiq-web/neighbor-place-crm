FILE : style.html
PART : (1)
PROJECT : Neighbor Place CRM v2
========================================================= -->

<style>

:root{

    --primary:#184E3B;
    --primary-dark:#10382B;
    --primary-light:#2C7A5A;

    --secondary:#F4F7F8;

    --success:#20C997;
    --warning:#F4B400;
    --danger:#DC3545;
    --info:#0DCAF0;

    --text:#1F2937;
    --text-light:#6B7280;

    --border:#E5E7EB;

    --white:#FFFFFF;

    --radius-sm:10px;
    --radius:16px;
    --radius-lg:22px;

    --shadow-sm:0 3px 10px rgba(0,0,0,.05);

    --shadow:

        0 10px 35px rgba(0,0,0,.08);

    --sidebar-width:270px;

    --transition:.25s ease;

}

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

html{

    scroll-behavior:smooth;

}

body{

    background:var(--secondary);

    color:var(--text);

    font-family:'Inter',sans-serif;

    overflow-x:hidden;

}

/* ======================================
APP
====================================== */

#crmApp{

    display:flex;

    min-height:100vh;

}

/* ======================================
SIDEBAR
====================================== */

.sidebar{

    position:fixed;

    top:0;

    left:0;

    width:var(--sidebar-width);

    height:100vh;

    background:linear-gradient(

        180deg,

        #184E3B,

        #10382B

    );

    color:#fff;

    display:flex;

    flex-direction:column;

    justify-content:space-between;

    z-index:100;

    overflow-y:auto;

}

.sidebar-top{

    padding:28px;

}

.brand-logo{

    display:flex;

    align-items:center;

    gap:16px;

}

.brand-icon{

    width:58px;

    height:58px;

    border-radius:16px;

    display:flex;

    align-items:center;

    justify-content:center;

    background:rgba(255,255,255,.15);

    font-size:25px;

}

.brand-text h4{

    font-size:20px;

    font-weight:700;

    margin:0;

}

.brand-text span{

    display:block;

    margin-top:4px;

    font-size:12px;

    opacity:.75;

    letter-spacing:1px;

}

/* ======================================
MENU
====================================== */

.sidebar-menu{

    padding:0 18px;

    display:flex;

    flex-direction:column;

    gap:8px;

}

.menu-item{

    width:100%;

    border:none;

    background:none;

    color:white;

    display:flex;

    align-items:center;

    gap:15px;

    padding:14px 18px;

    border-radius:14px;

    transition:var(--transition);

    font-weight:500;

    cursor:pointer;

}

.menu-item i{

    font-size:18px;

}

.menu-item:hover{

    background:rgba(255,255,255,.10);

}

.menu-item.active{

    background:#fff;

    color:var(--primary);

    font-weight:700;

    box-shadow:var(--shadow-sm);

}

/* ======================================
BOTTOM
====================================== */

.sidebar-bottom{

    padding:25px;

}

.business-card{

    background:rgba(255,255,255,.10);

    border-radius:18px;

    padding:20px;

}

.business-card small{

    display:block;

    opacity:.75;

    margin-bottom:6px;

}

.business-card strong{

    display:block;

    font-size:18px;

}

.business-card span{

    display:block;

    opacity:.8;

    margin-top:6px;

    font-size:13px;

}

/* ======================================
CONTENT
====================================== */

.main-content{

    margin-left:var(--sidebar-width);

    width:calc(100% - var(--sidebar-width));

    min-height:100vh;

    display:flex;

    flex-direction:column;

}

.topbar{

    background:white;

    padding:24px 35px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    border-bottom:1px solid var(--border);

}

.topbar-left{

    display:flex;

    align-items:center;

    gap:20px;

}

.topbar h2{

    margin:0;

    font-size:30px;

    font-weight:700;

}

.topbar p{

    margin:5px 0 0;

    color:var(--text-light);

}

.mobile-menu{

    width:48px;

    height:48px;

    border:none;

    display:none;

    border-radius:12px;

    background:var(--secondary);

    font-size:22px;

}

.content-wrapper{

    padding:35px;

}

/* ======================================
PAGE
====================================== */

.page{

    animation:fade .25s ease;

}

@keyframes fade{

    from{

        opacity:0;

        transform:translateY(12px);

    }

    to{

        opacity:1;

        transform:none;

    }

}

/* ======================================
CARDS
====================================== */

.cards{

    display:grid;

    grid-template-columns:

        repeat(auto-fit,minmax(240px,1fr));

    gap:22px;

}

.card-box{

    background:white;

    border-radius:20px;

    padding:24px;

    box-shadow:var(--shadow);

    transition:.25s;

}

.card-box:hover{

    transform:translateY(-5px);

}

.card-box h6{

    color:var(--text-light);

    font-size:13px;

    font-weight:600;

}

.card-box h2{

    margin-top:14px;

    font-size:34px;

    font-weight:800;

}
/* ======================================
TABLE CARD
====================================== */

.table-card{

    background:var(--white);

    border-radius:20px;

    padding:24px;

    box-shadow:var(--shadow);

    margin-bottom:24px;

}

.table-card h5{

    font-size:18px;

    font-weight:700;

    margin-bottom:20px;

}

/* ======================================
TABLE
====================================== */

.table{

    margin-bottom:0;

    vertical-align:middle;

}

.table thead th{

    border-bottom:2px solid var(--border);

    color:var(--text-light);

    font-size:13px;

    font-weight:700;

    text-transform:uppercase;

    letter-spacing:.4px;

    padding:16px;

}

.table tbody td{

    padding:18px 16px;

    border-color:#F1F3F5;

    font-size:14px;

}

.table-hover tbody tr{

    transition:.2s;

}

.table-hover tbody tr:hover{

    background:#F8FAFB;

}

/* ======================================
FORM
====================================== */

.form-control,

.form-select{

    border-radius:14px;

    border:1px solid var(--border);

    min-height:48px;

    box-shadow:none;

    transition:.2s;

}

.form-control:focus,

.form-select:focus{

    border-color:var(--primary);

    box-shadow:0 0 0 .18rem rgba(24,78,59,.15);

}

textarea.form-control{

    min-height:120px;

}

/* ======================================
BUTTON
====================================== */

.btn{

    border-radius:14px;

    min-height:46px;

    font-weight:600;

    transition:.25s;

}

.btn-success{

    background:var(--primary);

    border-color:var(--primary);

}

.btn-success:hover{

    background:var(--primary-dark);

    border-color:var(--primary-dark);

}

.btn-outline-success{

    border-color:var(--primary);

    color:var(--primary);

}

.btn-outline-success:hover{

    background:var(--primary);

    border-color:var(--primary);

}

.btn-warning{

    color:#fff;

}

.btn-group{

    display:flex;

    gap:8px;

}

/* ======================================
BADGE
====================================== */

.badge{

    padding:8px 14px;

    border-radius:999px;

    font-size:12px;

    font-weight:600;

}

/* ======================================
MODAL
====================================== */

.modal-content{

    border:none;

    border-radius:22px;

    overflow:hidden;

}

.modal-header{

    padding:20px 24px;

    border-bottom:1px solid var(--border);

}

.modal-body{

    padding:24px;

}

.modal-footer{

    padding:18px 24px;

    border-top:1px solid var(--border);

}

/* ======================================
TOAST
====================================== */

.toast{

    border-radius:16px;

}

.toast-header{

    background:white;

}

/* ======================================
LOADING
====================================== */

#loadingOverlay{

    position:fixed;

    inset:0;

    background:rgba(255,255,255,.85);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:9999;

    backdrop-filter:blur(4px);

}

.loading-box{

    background:white;

    padding:36px;

    border-radius:24px;

    text-align:center;

    box-shadow:var(--shadow);

    min-width:260px;

}

.loading-box h5{

    margin-top:18px;

    margin-bottom:8px;

    font-weight:700;

}

.loading-box p{

    margin:0;

    color:var(--text-light);

}

/* ======================================
UTILITY
====================================== */

.shadow-card{

    box-shadow:var(--shadow);

}

.rounded-xl{

    border-radius:20px;

}

.text-muted{

    color:var(--text-light)!important;

}

.cursor-pointer{

    cursor:pointer;

}

/* ======================================
SCROLLBAR
====================================== */

::-webkit-scrollbar{

    width:10px;

    height:10px;

}

::-webkit-scrollbar-track{

    background:#EEF2F4;

}

::-webkit-scrollbar-thumb{

    background:#C8D1D6;

    border-radius:999px;

}

::-webkit-scrollbar-thumb:hover{

    background:#9FAEB7;

}

/* ======================================
PAGE TRANSITION
====================================== */

.fade-enter{

    opacity:0;

    transform:translateY(8px);

}

.fade-enter-active{

    opacity:1;

    transform:none;

    transition:.25s ease;

}

/* ======================================
STAT CARD ICON
====================================== */

.card-box{

    position:relative;

    overflow:hidden;

}

.card-box::before{

    content:"";

    position:absolute;

    width:120px;

    height:120px;

    border-radius:50%;

    background:rgba(24,78,59,.05);

    right:-35px;

    top:-35px;

}

.card-box h2{

    position:relative;

    z-index:2;

}

.card-box h6{

    position:relative;

    z-index:2;

}

/* ======================================
EMPTY STATE
====================================== */

.empty-state{

    padding:60px 20px;

    text-align:center;

}

.empty-state i{

    font-size:60px;

    color:#C8CDD2;

    margin-bottom:15px;

}

.empty-state h5{

    margin-bottom:10px;

    font-weight:700;

}

.empty-state p{

    color:var(--text-light);

    margin:0;

}

/* ======================================
STATUS
====================================== */

.status-success{

    color:#198754;

    font-weight:600;

}

.status-warning{

    color:#B78103;

    font-weight:600;

}

.status-danger{

    color:#DC3545;

    font-weight:600;

}

.status-info{

    color:#0DCAF0;

    font-weight:600;

}

/* ======================================
ACTION BUTTON
====================================== */

.action-buttons{

    display:flex;

    gap:8px;

    flex-wrap:wrap;

}

.action-buttons .btn{

    min-height:38px;

    padding:0 14px;

    font-size:13px;

}

/* ======================================
INPUT GROUP
====================================== */

.search-group{

    position:relative;

}

.search-group i{

    position:absolute;

    left:15px;

    top:50%;

    transform:translateY(-50%);

    color:#9AA3AB;

}

.search-group .form-control{

    padding-left:42px;

}

/* ======================================
OFFCANVAS
====================================== */

.offcanvas{

    max-width:280px;

}

.offcanvas-header{

    background:var(--primary);

    color:white;

}

.offcanvas-title{

    font-weight:700;

}

.mobile-menu-list{

    display:flex;

    flex-direction:column;

    padding:15px;

    gap:8px;

}

.mobile-menu-list .menu-item{

    color:var(--text);

    background:#F6F8F9;

    border-radius:12px;

}

.mobile-menu-list .menu-item:hover{

    background:#E9F0EC;

    color:var(--primary);

}

/* ======================================
RESPONSIVE
====================================== */

@media(max-width:1200px){

    .cards{

        grid-template-columns:

            repeat(3,minmax(220px,1fr));

    }

}

@media(max-width:992px){

    .sidebar{

        display:none;

    }

    .main-content{

        margin-left:0;

        width:100%;

    }

    .mobile-menu{

        display:flex;

        justify-content:center;

        align-items:center;

    }

    .topbar{

        padding:20px;

    }

    .content-wrapper{

        padding:20px;

    }

    .cards{

        grid-template-columns:

            repeat(2,minmax(180px,1fr));

    }

}

@media(max-width:768px){

    .cards{

        grid-template-columns:1fr;

    }

    .topbar{

        flex-direction:column;

        align-items:flex-start;

        gap:15px;

    }

    .topbar-right{

        width:100%;

    }

    .topbar-right .btn{

        width:100%;

    }

    .table-responsive{

        overflow-x:auto;

    }

    .btn-group{

        flex-direction:column;

        width:100%;

    }

}

@media(max-width:576px){

    .content-wrapper{

        padding:15px;

    }

    .table-card{

        padding:18px;

    }

    .card-box{

        padding:20px;

    }

    .topbar h2{

        font-size:24px;

    }

}

</style>
