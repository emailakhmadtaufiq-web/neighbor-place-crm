<style>

:root{

    --primary:#184E3B;
    --primary-dark:#12392B;
    --primary-light:#2E7D5B;

    --background:#F5F7F9;

    --white:#FFFFFF;

    --text:#2F3437;

    --border:#E4E7EB;

    --shadow:0 5px 20px rgba(0,0,0,.08);

    --radius:16px;

}

*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}

html{

    scroll-behavior:smooth;

}

body{

    background:var(--background);

    font-family:'Poppins',sans-serif;

    color:var(--text);

}

a{

    text-decoration:none;

}

#app{

    display:flex;

    min-height:100vh;

}

/* ===============================
SIDEBAR
=============================== */

.sidebar{

    width:260px;

    background:var(--primary);

    color:#fff;

    position:fixed;

    left:0;

    top:0;

    bottom:0;

    padding:30px 20px;

    overflow:auto;

}

.logo{

    font-size:22px;

    font-weight:700;

    margin-bottom:40px;

}

.logo small{

    display:block;

    opacity:.8;

    font-size:12px;

    font-weight:400;

}

.menu{

    display:flex;

    flex-direction:column;

    gap:10px;

}

.menu a{

    color:white;

    padding:13px 18px;

    border-radius:10px;

    transition:.25s;

}

.menu a:hover{

    background:rgba(255,255,255,.12);

}

.menu a.active{

    background:white;

    color:var(--primary);

    font-weight:600;

}

/* ===============================
CONTENT
=============================== */

.content{

    margin-left:260px;

    width:100%;

    padding:35px;

}

/* ===============================
TOPBAR
=============================== */

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;

}

.topbar h2{

    font-size:28px;

    font-weight:700;

}

.status{

    background:#DFF5E8;

    color:#0B6E3D;

    padding:10px 18px;

    border-radius:999px;

    font-size:13px;

    font-weight:600;

}

/* ===============================
CARDS
=============================== */

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:30px;

}

.card-box{

    background:white;

    border-radius:var(--radius);

    padding:25px;

    box-shadow:var(--shadow);

}

.card-box h6{

    font-size:13px;

    color:#777;

}

.card-box h2{

    margin-top:10px;

    font-size:32px;

    font-weight:700;

}

/* ===============================
TABLE
=============================== */

.table-card{

    background:white;

    border-radius:var(--radius);

    box-shadow:var(--shadow);

    padding:25px;

}

/* ===============================
BUTTON
=============================== */

.btn-success{

    background:var(--primary);

    border:none;

}

.btn-success:hover{

    background:var(--primary-dark);

}

/* ===============================
LOADING
=============================== */

#loadingOverlay{

    display:none;

    position:fixed;

    inset:0;

    background:rgba(255,255,255,.85);

    z-index:99999;

    align-items:center;

    justify-content:center;

    flex-direction:column;

}

/* ===============================
RESPONSIVE
=============================== */

@media(max-width:992px){

.sidebar{

    width:100%;

    position:relative;

}

.content{

    margin-left:0;

}

.cards{

    grid-template-columns:1fr;

}

}

</style>
