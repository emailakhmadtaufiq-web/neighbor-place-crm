<script>

/* =====================================================
   Neighbor Place CRM
   Frontend Script
   Production v1.0
===================================================== */

let dashboardData = {};
let members = [];
let visits = [];
let rewards = [];
let settings = {};
let editingMemberId = "";

let memberModal = null;
let visitModal = null;

/* =====================================================
   INIT
===================================================== */

document.addEventListener("DOMContentLoaded", () => {

    memberModal = new bootstrap.Modal(
        document.getElementById("memberModal")
    );

    const visitModalElement = document.getElementById("visitModal");

    if (visitModalElement) {
        visitModal = new bootstrap.Modal(visitModalElement);
    }

    openPage("dashboardPage");

    initialize();
    const search=document.getElementById("searchMember");

    if(search){

        search.addEventListener(

            "keyup",

            searchMemberRealtime

        );

    }

    const level=document.getElementById("filterLevel");

    if(level){

        level.addEventListener(

            "change",

            searchMemberRealtime

        );

    }

    const status=document.getElementById("filterStatus");

    if(status){

        status.addEventListener(

            "change",

            searchMemberRealtime

        );

    }



});

/* =====================================================
   INITIALIZE
===================================================== */

function initialize(){

    loadDashboard();

    loadMembers();

}

/* =====================================================
   PAGE
===================================================== */

function openPage(page){

    document.querySelectorAll(".page")
    .forEach(p=>{

        p.style.display="none";

    });

    const current=document.getElementById(page);

    if(current){

        current.style.display="block";

    }

    document.querySelectorAll(".menu a")
    .forEach(item=>{

        item.classList.remove("active");

    });

    const menu=document.querySelector(`[data-page="${page}"]`);

    if(menu){

        menu.classList.add("active");

    }

    switch(page){

        case "dashboardPage":

            loadDashboard();

            break;

        case "membersPage":

            loadMembers();

            break;

        case "visitsPage":

            if(typeof loadVisits==="function"){

                loadVisits();

            }

            break;

        case "rewardsPage":

            if(typeof loadRewards==="function"){

                loadRewards();

            }

            break;

        case "settingsPage":

            if(typeof loadSettings==="function"){

                loadSettings();

            }

            break;

    }

}

/* =====================================================
   LOADING
===================================================== */

function showLoading(){

    document.getElementById("loadingOverlay").style.display="flex";

}

function hideLoading(){

    document.getElementById("loadingOverlay").style.display="none";

}

/* =====================================================
   TOAST
===================================================== */

function showToast(message){

    document.getElementById("toastMessage").innerHTML=message;

    const toast=new bootstrap.Toast(

        document.getElementById("appToast")

    );

    toast.show();

}

/* =====================================================
   DASHBOARD
===================================================== */

function loadDashboard(){

    showLoading();

    google.script.run

    .withSuccessHandler(function(data){

        dashboardData=data;

        setValue("totalMember",data.totalMember);

        setValue("totalVehicle",data.totalVehicle);

        setValue("silverMember",data.silver);

        setValue("goldMember",data.gold);

        setValue("platinumMember",data.platinum);

        setValue("rewardReady",data.rewardReady);

        setValue("visitToday",data.visitToday);

        setValue("visitMonth",data.visitMonth);

        setValue("newMemberMonth",data.newMemberMonth);

        hideLoading();

    })

    .withFailureHandler(function(error){

        hideLoading();

        showToast(error.message);

    })

    .getDashboard();

}

/* =====================================================
   MODAL
===================================================== */

function openMemberModal(){

    editingMemberId = null;

    clearMemberForm();

    const title = document.getElementById("memberModalTitle");

    if(title){

        title.innerHTML = "Tambah Member";

    }

    memberModal.show();

}

function closeMemberModal(){

    clearMemberForm();

    memberModal.hide();

}


function closeVisitModal(){

    if(visitModal){

        visitModal.hide();

    }

}

/* =====================================================
   HELPER
===================================================== */

function setValue(id,value){

    const el=document.getElementById(id);

    if(el){

        el.innerHTML=value ?? "";

    }

}

function getValue(id){

    const el=document.getElementById(id);

    if(!el) return "";

    return el.value.trim();

}

function clearMemberForm(){

    const fields = [

        "memberName",

        "memberPhone",

        "memberPlate",

        "memberVehicle"

    ];

    fields.forEach(function(id){

        const el = document.getElementById(id);

        if(el){

            el.value = "";

        }

    });

    editingMemberId = null;

    const title = document.getElementById("memberModalTitle");

    if(title){

        title.innerHTML = "Tambah Member";

    }

}
/* =====================================================
   MEMBER MODULE
===================================================== */

/**
 * LOAD MEMBER
 */
function loadMembers(){

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        hideLoading();

        members = result || [];

        renderMembers();

    })

    .withFailureHandler(serverError)

    .getMembers();

}

/**
 * RENDER MEMBER
 */

function renderMembers(list = members){

    const tbody = document.getElementById("memberTableBody");

    if(!tbody) return;

    tbody.innerHTML = "";

    if(list.length === 0){

        tbody.innerHTML = `

        <tr>

            <td colspan="8" class="text-center py-5">

                Belum ada member.

            </td>

        </tr>

        `;

        return;

    }

    list.forEach(member=>{

        tbody.innerHTML += createMemberRow(member);

    });

}

/**
 * TEMPLATE ROW
 */

function createMemberRow(member){

    const level = member[7] || "Silver";
    const status = member[6] || "Active";

    let levelBadge = "bg-secondary";

    if(level==="Silver") levelBadge="bg-secondary";
    if(level==="Gold") levelBadge="bg-warning text-dark";
    if(level==="Platinum") levelBadge="bg-primary";

    let statusBadge = "bg-success";

    if(status==="Inactive"){

        statusBadge="bg-danger";

    }

    return `

    <tr>

        <td>${member[0]}</td>

        <td>${member[1]}</td>

        <td>${member[2]}</td>

        <td>${member[3]}</td>

        <td>${member[4]}</td>

        <td>

            <span class="badge ${levelBadge}">

                ${level}

            </span>

        </td>

        <td>

            <span class="badge ${statusBadge}">

                ${status}

            </span>

        </td>

        <td>

            <div class="btn-group">

                <button
                class="btn btn-success btn-sm"
                onclick="quickVisit('${member[0]}')">

                Visit

                </button>

                <button
                class="btn btn-warning btn-sm"
                onclick="editMember('${member[0]}')">

                Edit

                </button>

                <button
                class="btn btn-danger btn-sm"
                onclick="removeMember('${member[0]}')">

                Inactive

                </button>

            </div>

        </td>

    </tr>

    `;

}
/* =====================================
   CREATE MEMBER
===================================== */
function saveMember(){

    const data = {

        name: getValue("memberName"),
        phone: getValue("memberPhone"),
        plate: getValue("memberPlate"),
        vehicle: getValue("memberVehicle")

    };

    if(
        !data.name ||
        !data.phone ||
        !data.plate ||
        !data.vehicle
    ){

        showToast("Lengkapi seluruh data.");

        return;

    }

    showLoading();

    if(editingMemberId){

        google.script.run

        .withSuccessHandler(afterSaveMember)

        .withFailureHandler(serverError)

        .updateMember(
            editingMemberId,
            data
        );

        return;

    }

    google.script.run

    .withSuccessHandler(afterSaveMember)

    .withFailureHandler(serverError)

    .createMember(data);

}

function afterSaveMember(result){

    hideLoading();

    if(!result.success){

        showToast(result.message);

        return;

    }

    editingMemberId = null;

    clearMemberForm();

    closeMemberModal();

    loadMembers();

    loadDashboard();

    showToast(result.message);

}
function removeMember(memberId){

    if(!confirm("Nonaktifkan member ini?")){

        return;

    }

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        hideLoading();

        showToast(result.message);

        loadMembers();

        loadDashboard();

    })

    .withFailureHandler(serverError)

    .deactivateMember(memberId);

}
function serverError(err){

    hideLoading();

    showToast(err.message);

}
/* =====================================
   SEARCH MEMBER
===================================== */

function searchMemberRealtime(){

    const keyword = getValue("searchMember").toLowerCase();

    const level = document.getElementById("filterLevel").value;

    const status = document.getElementById("filterStatus").value;

    const result = members.filter(function(member){

        const search =

            String(member[0]).toLowerCase().includes(keyword) ||

            String(member[1]).toLowerCase().includes(keyword) ||

            String(member[2]).toLowerCase().includes(keyword) ||

            String(member[3]).toLowerCase().includes(keyword);

        const levelOK =

            level==="" ||

            member[7]===level;

        const statusOK =

            status==="" ||

            member[6]===status;

        return search && levelOK && statusOK;

    });

    renderMembers(result);

}

/* =====================================
   EDIT MEMBER
===================================== */

function editMember(memberId){

    const member = members.find(function(item){

        return item[0] === memberId;

    });

    if(!member){

        showToast("Member tidak ditemukan.");

        return;

    }

    editingMemberId = memberId;

    document.getElementById("memberName").value = member[1];

    document.getElementById("memberPhone").value = member[2];

    document.getElementById("memberPlate").value = member[3];

    document.getElementById("memberVehicle").value = member[4];

    const title = document.getElementById("memberModalTitle");

    if(title){

        title.innerHTML = "Edit Member";

    }

    memberModal.show();

}

/* =====================================
   QUICK VISIT
===================================== */

function quickVisit(memberId){

    if(!confirm("Tambah visit sekarang?")){

        return;

    }

    showLoading();

    google.script.run

    .withSuccessHandler(function(res){

        hideLoading();

        showToast(res.message);

        loadDashboard();

        loadMembers();

        if(typeof loadVisits==="function"){

            loadVisits();

        }

    })

    .withFailureHandler(serverError)

    .createVisit(memberId);

}

/* =====================================================
   VISIT MODULE
===================================================== */

function loadVisits(){

    showLoading();

    google.script.run

    .withSuccessHandler(function(data){

        visits = data || [];

        renderVisits(visits);

        hideLoading();

    })

    .withFailureHandler(function(err){

        hideLoading();

        showToast(err.message);

    })

    .getVisits();

}

function renderVisits(data){

    const tbody=document.getElementById("visitTableBody");

    if(!tbody) return;

    tbody.innerHTML="";

    if(data.length===0){

        tbody.innerHTML=`

        <tr>

            <td colspan="4" class="text-center py-5">

                Belum ada data visit.

            </td>

        </tr>

        `;

        return;

    }

    data.forEach(v=>{

        tbody.innerHTML += `

        <tr>

            <td>${v[0]}</td>

            <td>${v[1]}</td>

            <td>${v[2]}</td>

            <td>${v[3]}</td>

        </tr>

        `;

    });

}

/* ==========================================
   OPEN VISIT MODAL
========================================== */

function openVisitModal(){

    const input=document.getElementById("visitMemberID");

    if(input){

        input.value="";

    }

    if(visitModal){

        visitModal.show();

    }

}

/* ==========================================
   SAVE VISIT
========================================== */

function saveVisit(){

    const memberId=getValue("visitMemberID");

    if(memberId===""){

        showToast("Masukkan Member ID.");

        return;

    }

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        hideLoading();

        if(result.success){

            closeVisitModal();

            showToast(result.message);

            loadVisits();

            loadMembers();

            loadDashboard();

        }else{

            showToast(result.message);

        }

    })

    .withFailureHandler(function(err){

        hideLoading();

        showToast(err.message);

    })

    .createVisit(memberId);

}

/* ==========================================
   SEARCH VISIT
========================================== */

function searchVisitRealtime(){

    const keyword=

    getValue("searchVisit")

    .toLowerCase();

    if(keyword===""){

        renderVisits(visits);

        return;

    }

    const filtered=visits.filter(v=>{

        return(

            String(v[0]).toLowerCase().includes(keyword)||

            String(v[1]).toLowerCase().includes(keyword)||

            String(v[2]).toLowerCase().includes(keyword)||

            String(v[3]).toLowerCase().includes(keyword)

        );

    });

    renderVisits(filtered);

}

/* ==========================================
   FILTER TANGGAL
========================================== */

function filterVisitDate(){

    const value=document.getElementById("visitDate").value;

    if(value===""){

        renderVisits(visits);

        return;

    }

    const filtered=visits.filter(v=>{

        return String(v[2]).startsWith(value);

    });

    renderVisits(filtered);

}

/* ==========================================
   AUTO EVENT
========================================== */



/* =====================================================
   REWARD MODULE
===================================================== */

function loadRewards(){

    showLoading();

    google.script.run

    .withSuccessHandler(function(data){

        rewards = data || [];

        renderRewards(rewards);

        hideLoading();

    })

    .withFailureHandler(function(err){

        hideLoading();

        showToast(err.message);

    })

    .getRewards();

}

function renderRewards(data){

    const tbody=document.getElementById("rewardTableBody");

    if(!tbody) return;

    tbody.innerHTML="";

    if(data.length===0){

        tbody.innerHTML=`

        <tr>

            <td colspan="5" class="text-center py-5">

                Belum ada reward.

            </td>

        </tr>

        `;

        return;

    }

    data.forEach(r=>{

        const badge=

        r[3]==="Ready"

        ?'<span class="badge bg-success">Ready</span>'

        :'<span class="badge bg-secondary">'+r[3]+'</span>';

        tbody.innerHTML+=`

        <tr>

            <td>${r[0]}</td>

            <td>${r[1]}</td>

            <td>${r[2]}</td>

            <td>${badge}</td>

            <td>

                ${r[3]==="Ready"

                ?`

                <button

                    class="btn btn-success btn-sm"

                    onclick="claimReward('${r[0]}')">

                    Claim

                </button>

                `

                :"-"}

            </td>

        </tr>

        `;

    });

}

function claimReward(rewardId){

    if(!confirm("Claim reward ini?")){

        return;

    }

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        hideLoading();

        showToast(result.message);

        loadRewards();

        loadDashboard();

    })

    .withFailureHandler(function(err){

        hideLoading();

        showToast(err.message);

    })

    .claimReward(rewardId);

}

/* =====================================================
   SETTINGS MODULE
===================================================== */

function loadSettings(){

    google.script.run

    .withSuccessHandler(function(data){

        settings=data||{};

        setInput("businessName",settings.BusinessName);

        setInput("businessPhone",settings.BusinessPhone);

        setInput("businessAddress",settings.BusinessAddress);

        setInput("settingReward",settings.RewardTarget);

        setInput("settingGold",settings.GoldTarget);

        setInput("settingPlatinum",settings.PlatinumTarget);

    })

    .getSettings();

}

function saveSettings(){

    showLoading();

    const items=[

        ["BusinessName",getValue("businessName")],

        ["BusinessPhone",getValue("businessPhone")],

        ["BusinessAddress",getValue("businessAddress")],

        ["RewardTarget",getValue("settingReward")],

        ["GoldTarget",getValue("settingGold")],

        ["PlatinumTarget",getValue("settingPlatinum")]

    ];

    saveSettingQueue(items,0);

}

function saveSettingQueue(items,index){

    if(index>=items.length){

        hideLoading();

        showToast("Setting berhasil disimpan.");

        loadDashboard();

        return;

    }

    google.script.run

    .withSuccessHandler(function(){

        saveSettingQueue(items,index+1);

    })

    .withFailureHandler(function(err){

        hideLoading();

        showToast(err.message);

    })

    .updateSetting(

        items[index][0],

        items[index][1]

    );

}

/* =====================================================
   HELPER
===================================================== */

function setInput(id,value){

    const el=document.getElementById(id);

    if(el){

        el.value=value ?? "";

    }

}

/* =====================================================
   GLOBAL SEARCH
===================================================== */

function debounce(callback, delay = 300){

    let timer;

    return function(){

        clearTimeout(timer);

        const args = arguments;

        timer = setTimeout(() => {

            callback.apply(this,args);

        },delay);

    };

}

/* =====================================================
   REFRESH
===================================================== */

function refreshAll(){

    loadDashboard();

    loadMembers();

    if(typeof loadVisits==="function"){

        loadVisits();

    }

    if(typeof loadRewards==="function"){

        loadRewards();

    }

}

/* =====================================================
   EXPORT
===================================================== */

function exportMembers(){

    showToast("Fitur Export akan tersedia pada versi berikutnya.");

}

function exportVisits(){

    showToast("Fitur Export akan tersedia pada versi berikutnya.");

}

function exportRewards(){

    showToast("Fitur Export akan tersedia pada versi berikutnya.");

}

/* =====================================================
   UTIL
===================================================== */

function currency(number){

    return new Intl.NumberFormat("id-ID").format(number);

}

function formatDateTime(date){

    if(!date) return "";

    try{

        return new Date(date)

        .toLocaleString("id-ID");

    }catch(e){

        return date;

    }

}

function capitalize(text){

    if(!text) return "";

    return text

        .toString()

        .toLowerCase()

        .replace(/\b\w/g,function(l){

            return l.toUpperCase();

        });

}

/* =====================================================
   SHORTCUT
===================================================== */

document.addEventListener("keydown",function(e){

    if(e.ctrlKey && e.key==="r"){

        e.preventDefault();

        refreshAll();

    }

});

/* =====================================================
   CONNECTION
===================================================== */

window.addEventListener("online",function(){

    showToast("Koneksi kembali online.");

});

window.addEventListener("offline",function(){

    showToast("Koneksi internet terputus.");

});

/* =====================================================
   AUTO REFRESH
===================================================== */

setInterval(function(){

    const page=document.querySelector(".menu a.active");

    if(!page) return;

    switch(page.dataset.page){

        case "dashboardPage":

            loadDashboard();

            break;

        case "membersPage":

            loadMembers();

            break;

        case "visitsPage":

            if(typeof loadVisits==="function"){

                loadVisits();

            }

            break;

        case "rewardsPage":

            if(typeof loadRewards==="function"){

                loadRewards();

            }

            break;

    }

},60000);

/* =====================================================
   START
===================================================== */

console.log("Neighbor Place CRM v1.0 Loaded");

</script>
