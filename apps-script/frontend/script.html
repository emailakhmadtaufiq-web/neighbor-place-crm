<script>

/* ==========================================================
    Neighbor Place CRM
    Frontend Script v2
    PART (1)
========================================================== */

/* ==========================================================
GLOBAL STATE
========================================================== */

let dashboardData = {};

let members = [];

let visits = [];

let rewards = [];

let settings = {};

let editingMemberId = null;

let memberModal = null;

let visitModal = null;

let globalModal = null;

/* ==========================================================
INITIALIZE
========================================================== */

document.addEventListener("DOMContentLoaded",function(){

    initializeApplication();

});

/* ==========================================================
APPLICATION
========================================================== */

function initializeApplication(){

    initializeModal();

    initializeEvents();

    openPage("dashboardPage");

    refreshAll();

    loadSettings();

}

/* ==========================================================
MODAL
========================================================== */

function initializeModal(){

    const member=document.getElementById("memberModal");

    if(member){

        memberModal=new bootstrap.Modal(member);

    }

    const visit=document.getElementById("visitModal");

    if(visit){

        visitModal=new bootstrap.Modal(visit);

    }

    const global=document.getElementById("globalModal");

    if(global){

        globalModal=new bootstrap.Modal(global);

    }

}

/* ==========================================================
EVENT
========================================================== */

function initializeEvents(){

    bindMemberSearch();

    bindVisitSearch();

    bindRewardSearch();

}

/* ==========================================================
PAGE
========================================================== */

function openPage(page){

    document

    .querySelectorAll(".page")

    .forEach(function(item){

        item.style.display="none";

    });

    const current=document.getElementById(page);

    if(current){

        current.style.display="block";

    }

    document

    .querySelectorAll(".sidebar .menu-item")

    .forEach(function(menu){

        menu.classList.remove("active");

    });

    const active=document.querySelector(

        '.sidebar .menu-item[data-page="'+page+'"]'

    );

    if(active){

        active.classList.add("active");

    }

    updateTitle(page);

    switch(page){

        case "dashboardPage":

            loadDashboard();

            break;

        case "membersPage":

            loadMembers();

            break;

        case "visitsPage":

            loadVisits();

            break;

        case "rewardsPage":

            loadRewards();

            break;

        case "settingsPage":

            loadSettings();

            break;

    }

}

/* ==========================================================
TITLE
========================================================== */

function updateTitle(page){

    const title=document.getElementById("pageTitle");

    const desc=document.getElementById("pageDescription");

    if(!title || !desc){

        return;

    }

    switch(page){

        case "dashboardPage":

            title.innerHTML="Dashboard";

            desc.innerHTML="Customer Loyalty Overview";

            break;

        case "membersPage":

            title.innerHTML="Members";

            desc.innerHTML="Kelola seluruh member";

            break;

        case "visitsPage":

            title.innerHTML="Visits";

            desc.innerHTML="Riwayat kunjungan pelanggan";

            break;

        case "rewardsPage":

            title.innerHTML="Rewards";

            desc.innerHTML="Reward Management";

            break;

        case "settingsPage":

            title.innerHTML="Settings";

            desc.innerHTML="Konfigurasi aplikasi";

            break;

    }

}

/* ==========================================================
LOADING
========================================================== */

function showLoading(){

    const overlay=document.getElementById(

        "loadingOverlay"

    );

    if(overlay){

        overlay.style.display="flex";

    }

}

function hideLoading(){

    const overlay=document.getElementById(

        "loadingOverlay"

    );

    if(overlay){

        overlay.style.display="none";

    }

}

/* ==========================================================
TOAST
========================================================== */

function showToast(message){

    const body=document.getElementById(

        "toastMessage"

    );

    if(body){

        body.innerHTML=message;

    }

    const toast=new bootstrap.Toast(

        document.getElementById("appToast")

    );

    toast.show();

}

/* ==========================================================
SERVER ERROR
========================================================== */

function serverError(error){

    hideLoading();

    if(error){

        showToast(

            error.message ||

            "Terjadi kesalahan."

        );

        return;

    }

    showToast(

        "Server Error."

    );

}

/* ==========================================================
HELPER
========================================================== */

function getValue(id){

    const el=document.getElementById(id);

    if(!el){

        return "";

    }

    return el.value.trim();

}

function setInput(id,value){

    const el=document.getElementById(id);

    if(el){

        el.value=value ?? "";

    }

}

function setHTML(id,value){

    const el=document.getElementById(id);

    if(el){

        el.innerHTML=value ?? "";

    }

}

function capitalize(text){

    if(!text){

        return "";

    }

    return text

        .toLowerCase()

        .replace(/\b\w/g,function(x){

            return x.toUpperCase();

        });

}

function currency(number){

    return new Intl.NumberFormat(

        "id-ID"

    ).format(number);

}

function formatDate(date){

    try{

        return new Date(date)

        .toLocaleString("id-ID");

    }catch(e){

        return date;

    }

}

/* ==========================================================
REFRESH
========================================================== */

function refreshAll(){

    loadMembers();

}

}
/* ==========================================================
DASHBOARD
========================================================== */

function loadDashboard(){

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        dashboardData=result || {};

        renderDashboard();

        hideLoading();

    })

    .withFailureHandler(serverError)

    .getDashboard();

}

function renderDashboard(){

    setHTML(

        "totalMember",

        dashboardData.totalMember || 0

    );

    setHTML(

        "totalVehicle",

        dashboardData.totalVehicle || 0

    );

    setHTML(

        "silverMember",

        dashboardData.silver || 0

    );

    setHTML(

        "goldMember",

        dashboardData.gold || 0

    );

    setHTML(

        "platinumMember",

        dashboardData.platinum || 0

    );

    setHTML(

        "rewardReady",

        dashboardData.rewardReady || 0

    );


    setHTML(

        "visitToday",

        dashboardData.visitToday || 0

    );

    setHTML(

        "visitMonth",

        dashboardData.visitMonth || 0

    );

    setHTML(

        "newMemberMonth",

        dashboardData.newMemberMonth || 0

    );

}

/* ==========================================================
MEMBER
========================================================== */

function loadMembers(){

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        members=result || [];

        renderMembers(members);

        hideLoading();

    })

    .withFailureHandler(serverError)

    .getMembers();

}

function renderMembers(data){

    const tbody=document.getElementById(

        "memberTableBody"

    );

    if(!tbody){

        return;

    }

    tbody.innerHTML="";

    if(data.length===0){

        tbody.innerHTML=`

        <tr>

            <td colspan="8">

                <div class="empty-state">

                    <i class="bi bi-people"></i>

                    <h5>

                        Belum ada member

                    </h5>

                    <p>

                        Tambahkan member pertama.

                    </p>

                </div>

            </td>

        </tr>

        `;

        return;

    }

    data.forEach(function(member){

        tbody.innerHTML+=memberRow(member);

    });

}

function memberRow(member){

    let levelClass="bg-secondary";

    switch(member[7]){

        case "Gold":

            levelClass="bg-warning text-dark";

            break;

        case "Platinum":

            levelClass="bg-primary";

            break;

    }

    const statusClass=

    member[6]==="Inactive"

    ?"bg-danger"

    :"bg-success";

    return`

<tr>

<td>${member[0]}</td>

<td>${member[1]}</td>

<td>${member[2]}</td>

<td>${member[3]}</td>

<td>${member[4]}</td>

<td>

<span class="badge ${levelClass}">

${member[7]}

</span>

</td>

<td>

<span class="badge ${statusClass}">

${member[6]}

</span>

</td>

<td>

<div class="action-buttons">

<button

class="btn btn-success btn-sm"

onclick="quickVisit('${member[0]}')">

Visit

</button>

<button

class="btn btn-warning btn-sm"

onclick="editMember('${member[0]}')">

Edit

</button>

<button

class="btn btn-danger btn-sm"

onclick="removeMember('${member[0]}')">

Inactive

</button>

</div>

</td>

</tr>

`;

}

/* ==========================================================
SEARCH MEMBER
========================================================== */

function bindMemberSearch(){

    const search=document.getElementById(

        "searchMember"

    );

    if(search){

        search.addEventListener(

            "keyup",

            searchMember

        );

    }

    const level=document.getElementById(

        "filterLevel"

    );

    if(level){

        level.addEventListener(

            "change",

            searchMember

        );

    }

    const status=document.getElementById(

        "filterStatus"

    );

    if(status){

        status.addEventListener(

            "change",

            searchMember

        );

    }

}

function searchMember(){

    const keyword=

    getValue("searchMember")

    .toLowerCase();

    const level=

    getValue("filterLevel");

    const status=

    getValue("filterStatus");

    const filtered=

    members.filter(function(item){

        const found=

        item.join(" ")

        .toLowerCase()

        .includes(keyword);

        const levelOK=

        level===""

        ||

        item[7]===level;

        const statusOK=

        status===""

        ||

        item[6]===status;

        return found &&

               levelOK &&

               statusOK;

    });

    renderMembers(filtered);

}
/* ==========================================================
OPEN MEMBER MODAL
========================================================== */

function openMemberModal(){

    editingMemberId=null;

    clearMemberForm();

    const title=document.getElementById(

        "memberModalTitle"

    );

    if(title){

        title.innerHTML="Tambah Member";

    }

    memberModal.show();

}

function closeMemberModal(){

    clearMemberForm();

    memberModal.hide();

}

function clearMemberForm(){

    [

        "memberName",

        "memberPhone",

        "memberPlate",

        "memberVehicle"

    ].forEach(function(id){

        const el=document.getElementById(id);

        if(el){

            el.value="";

        }

    });

}

/* ==========================================================
SAVE MEMBER
========================================================== */

function saveMember(){

    const data={

        name:getValue("memberName"),

        phone:getValue("memberPhone"),

        plate:getValue("memberPlate")

            .toUpperCase(),

        vehicle:getValue("memberVehicle")

    };

    if(

        data.name===""

        ||

        data.phone===""

        ||

        data.plate===""

        ||

        data.vehicle===""

    ){

        showToast(

            "Lengkapi seluruh data."

        );

        return;

    }

    showLoading();

    if(editingMemberId){

        google.script.run

        .withSuccessHandler(

            afterSaveMember

        )

        .withFailureHandler(

            serverError

        )

        .updateMember(

            editingMemberId,

            data

        );

        return;

    }

    google.script.run

    .withSuccessHandler(

        afterSaveMember

    )

    .withFailureHandler(

        serverError

    )

    .createMember(data);

}

function afterSaveMember(result){

    hideLoading();

    if(!result.success){

        showToast(result.message);

        return;

    }

    editingMemberId=null;

    closeMemberModal();

    loadMembers();

    loadDashboard();

    showToast(result.message);

}

/* ==========================================================
EDIT MEMBER
========================================================== */

function editMember(id){

    const member=

    members.find(function(item){

        return item[0]===id;

    });

    if(!member){

        showToast(

            "Member tidak ditemukan."

        );

        return;

    }

    editingMemberId=id;

    setInput(

        "memberName",

        member[1]

    );

    setInput(

        "memberPhone",

        member[2]

    );

    setInput(

        "memberPlate",

        member[3]

    );

    setInput(

        "memberVehicle",

        member[4]

    );

    document.getElementById(

        "memberModalTitle"

    ).innerHTML="Edit Member";

    memberModal.show();

}

/* ==========================================================
REMOVE MEMBER
========================================================== */

function removeMember(id){

    if(

        !confirm(

            "Nonaktifkan member ini?"

        )

    ){

        return;

    }

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        hideLoading();

        showToast(result.message);

        loadMembers();

        loadDashboard();

    })

    .withFailureHandler(

        serverError

    )

    .deactivateMember(id);

}

/* ==========================================================
QUICK VISIT
========================================================== */

function quickVisit(memberId){

    if(

        !confirm(

            "Tambah visit sekarang?"

        )

    ){

        return;

    }

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        hideLoading();

        showToast(result.message);

        loadDashboard();

        loadMembers();

        loadVisits();

    })

    .withFailureHandler(

        serverError

    )

    .createVisit(memberId);

}
/* ==========================================================
VISIT MODULE
========================================================== */

function loadVisits(){

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        visits=result || [];

        renderVisits(visits);

        hideLoading();

    })

    .withFailureHandler(serverError)

    .getVisits();

}

function renderVisits(data){

    const tbody=document.getElementById(

        "visitTableBody"

    );

    if(!tbody){

        return;

    }

    tbody.innerHTML="";

    if(data.length===0){

        tbody.innerHTML=`

<tr>

<td colspan="4">

<div class="empty-state">

<i class="bi bi-car-front"></i>

<h5>

Belum ada visit

</h5>

<p>

Riwayat kunjungan akan muncul di sini.

</p>

</div>

</td>

</tr>

`;

        return;

    }

    data.forEach(function(item){

        tbody.innerHTML+=`

<tr>

<td>${item[0]}</td>

<td>${item[1]}</td>

<td>${item[2]}</td>

<td>${item[3]}</td>

</tr>

`;

    });

}

/* ==========================================================
VISIT MODAL
========================================================== */

function openVisitModal(){

    const input=document.getElementById(

        "visitMemberID"

    );

    if(input){

        input.value="";

    }

    visitModal.show();

}

function closeVisitModal(){

    visitModal.hide();

}

/* ==========================================================
SAVE VISIT
========================================================== */

function saveVisit(){

    const memberId=

    getValue("visitMemberID");

    if(memberId===""){

        showToast(

            "Masukkan Member ID."

        );

        return;

    }

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        hideLoading();

        if(!result.success){

            showToast(

                result.message

            );

            return;

        }

        visitModal.hide();

        loadVisits();

        loadDashboard();

        loadMembers();

        showToast(

            result.message

        );

    })

    .withFailureHandler(

        serverError

    )

    .createVisit(memberId);

}

/* ==========================================================
SEARCH VISIT
========================================================== */

function bindVisitSearch(){

    const search=document.getElementById(

        "searchVisit"

    );

    if(search){

        search.addEventListener(

            "keyup",

            searchVisit

        );

    }

    const date=document.getElementById(

        "visitDate"

    );

    if(date){

        date.addEventListener(

            "change",

            searchVisit

        );

    }

}

function searchVisit(){

    const keyword=

    getValue("searchVisit")

    .toLowerCase();

    const date=

    getValue("visitDate");

    const filtered=

    visits.filter(function(item){

        const search=

        item.join(" ")

        .toLowerCase()

        .includes(keyword);

        const dateOK=

        date===""

        ||

        String(item[2])

        .startsWith(date);

        return search && dateOK;

    });

    renderVisits(filtered);

}
 /* ==========================================================
REWARD MODULE
========================================================== */

function loadRewards(){

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        rewards=result || [];

        renderRewards(rewards);

        hideLoading();

    })

    .withFailureHandler(serverError)

    .getRewards();

}

function renderRewards(data){

    const tbody=document.getElementById(

        "rewardTableBody"

    );

    if(!tbody){

        return;

    }

    tbody.innerHTML="";

    if(data.length===0){

        tbody.innerHTML=`

<tr>

<td colspan="5">

<div class="empty-state">

<i class="bi bi-gift"></i>

<h5>

Belum ada reward

</h5>

<p>

Reward member akan muncul di sini.

</p>

</div>

</td>

</tr>

`;

        return;

    }

    data.forEach(function(item){

        let badge=

        '<span class="badge bg-secondary">'

        +item[3]+

        '</span>';

        if(item[3]==="Ready"){

            badge=

            '<span class="badge bg-success">Ready</span>';

        }

        tbody.innerHTML+=`

<tr>

<td>${item[0]}</td>

<td>${item[1]}</td>

<td>${formatDate(item[5])}</td>

<td>${badge}</td>

<td>

${item[3]==="Ready"

?

`<button

class="btn btn-success btn-sm"

onclick="claimReward('${item[0]}')">

Claim

</button>`

:

"-"

}

</td>

</tr>

`;

    });

}

/* ==========================================================
CLAIM REWARD
========================================================== */

function claimReward(id){

    if(

        !confirm(

            "Claim reward ini?"

        )

    ){

        return;

    }

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        hideLoading();

        showToast(result.message);

        loadRewards();

        loadDashboard();

        loadMembers();

    })

    .withFailureHandler(

        serverError

    )

    .claimReward(id);

}

/* ==========================================================
SEARCH REWARD
========================================================== */

function bindRewardSearch(){

    const search=document.getElementById(

        "searchReward"

    );

    if(search){

        search.addEventListener(

            "keyup",

            searchReward

        );

    }

    const status=document.getElementById(

        "rewardStatus"

    );

    if(status){

        status.addEventListener(

            "change",

            searchReward

        );

    }

}

function searchReward(){

    const keyword=

    getValue("searchReward")

    .toLowerCase();

    const status=

    getValue("rewardStatus");

    const filtered=

    rewards.filter(function(item){

        const found=

        item.join(" ")

        .toLowerCase()

        .includes(keyword);

        const statusOK=

        status===""

        ||

        item[3]===status;

        return found && statusOK;

    });

    renderRewards(filtered);

}
/* ==========================================================
SETTINGS MODULE
========================================================== */

function loadSettings(){

    showLoading();

    google.script.run

    .withSuccessHandler(function(result){

        settings=result || {};
        setHTML(
    "dashboardBusinessName",
    settings.BusinessName || "Neighbor Place"
);

setHTML(
    "dashboardRewardTarget",
    settings.RewardTarget || "-"
);

setHTML(
    "dashboardGoldTarget",
    settings.GoldTarget || "-"
);

setHTML(
    "dashboardPlatinumTarget",
    settings.PlatinumTarget || "-"
);

        setInput(

            "businessName",

            settings.BusinessName

        );

        setInput(

            "businessPhone",

            settings.BusinessPhone

        );

        setInput(

            "businessAddress",

            settings.BusinessAddress

        );

        setInput(

            "settingReward",

            settings.RewardTarget

        );

        setInput(

            "settingGold",

            settings.GoldTarget

        );

        setInput(

            "settingPlatinum",

            settings.PlatinumTarget

        );

        hideLoading();

    })

    .withFailureHandler(serverError)

    .getSettings();

}

/* ==========================================================
SAVE SETTINGS
========================================================== */

function saveSettings(){

    showLoading();

    const items=[

        [

            "BusinessName",

            getValue("businessName")

        ],

        [

            "BusinessPhone",

            getValue("businessPhone")

        ],

        [

            "BusinessAddress",

            getValue("businessAddress")

        ],

        [

            "RewardTarget",

            getValue("settingReward")

        ],

        [

            "GoldTarget",

            getValue("settingGold")

        ],

        [

            "PlatinumTarget",

            getValue("settingPlatinum")

        ]

    ];

    updateSettingQueue(

        items,

        0

    );

}

function updateSettingQueue(

    items,

    index

){

    if(index>=items.length){

        hideLoading();

        showToast(

            "Setting berhasil disimpan."

        );

        loadDashboard();

        return;

    }

    google.script.run

    .withSuccessHandler(function(){

        updateSettingQueue(

            items,

            index+1

        );

    })

    .withFailureHandler(serverError)

    .updateSetting(

        items[index][0],

        items[index][1]

    );

}

/* ==========================================================
AUTO REFRESH
========================================================== */

setInterval(function(){

    const active=document.querySelector(

        ".sidebar .menu-item.active"

    );

    if(!active){

        return;

    }

    switch(active.dataset.page){

        case "dashboardPage":

            loadDashboard();

            break;

        case "membersPage":

            loadMembers();

            break;

        case "visitsPage":

            loadVisits();

            break;

        case "rewardsPage":

            loadRewards();

            break;

    }

},60000);

/* ==========================================================
KEYBOARD SHORTCUT
========================================================== */

document.addEventListener(

    "keydown",

    function(e){

        if(

            e.ctrlKey &&

            e.key==="r"

        ){

            e.preventDefault();

            refreshAll();

        }

    }

);

/* ==========================================================
NETWORK STATUS
========================================================== */

window.addEventListener(

    "online",

    function(){

        showToast(

            "Koneksi kembali online."

        );

    }

);

window.addEventListener(

    "offline",

    function(){

        showToast(

            "Koneksi internet terputus."

        );

    }

);

/* ==========================================================
EXPORT PLACEHOLDER
========================================================== */

function exportMembers(){

    showToast(

        "Export akan tersedia pada update berikutnya."

    );

}

function exportVisits(){

    showToast(

        "Export akan tersedia pada update berikutnya."

    );

}

function exportRewards(){

    showToast(

        "Export akan tersedia pada update berikutnya."

    );

}

/* ==========================================================
END
========================================================== */

console.log(

    "Neighbor Place CRM v2 Loaded"

);

</script>
