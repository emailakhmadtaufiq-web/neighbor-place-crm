<section id="membersPage" class="page" style="display:none;">

    <div class="topbar">

        <div>

            <h2>Members</h2>

            <small>Manajemen Member Neighbor Place</small>

        </div>

        <div class="d-flex gap-2">

            <button
                class="btn btn-success"
                onclick="openMemberModal()">

                <i class="bi bi-person-plus-fill"></i>

                Tambah Member

            </button>

        </div>

    </div>

    <div class="table-card">

        <div class="row mb-4">

            <div class="col-md-5">

                <input
                    id="searchMember"
                    class="form-control"
                    placeholder="Cari Nama / Plat / No HP"
                    onkeyup="searchMemberRealtime()">

            </div>

            <div class="col-md-3">

                <select
                    id="filterLevel"
                    class="form-select">

                    <option value="">Semua Level</option>

                    <option>Silver</option>

                    <option>Gold</option>

                    <option>Platinum</option>

                </select>

            </div>

            <div class="col-md-2">

                <select
                    id="filterStatus"
                    class="form-select">

                    <option value="">Semua Status</option>

                    <option>Active</option>

                    <option>Inactive</option>

                </select>

            </div>

            <div class="col-md-2">

                <button
                    class="btn btn-outline-success w-100"
                    onclick="loadMembers()">

                    Refresh

                </button>

            </div>

        </div>

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>

                    <tr>

                        <th width="140">Member ID</th>

                        <th>Nama</th>

                        <th>No HP</th>

                        <th>Plat</th>

                        <th>Kendaraan</th>

                        <th>Level</th>

                        <th>Status</th>

                        <th width="220">

                            Aksi

                        </th>

                    </tr>

                </thead>

                <tbody id="memberTableBody">

                </tbody>

            </table>

        </div>

    </div>

</section>

<!-- MEMBER MODAL -->

<div
    class="modal fade"
    id="memberModal"
    tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Tambah Member

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label>Nama</label>

                    <input
                        id="memberName"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label>No HP</label>

                    <input
                        id="memberPhone"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label>Plat Nomor</label>

                    <input
                        id="memberPlate"
                        class="form-control"
                        style="text-transform:uppercase;">

                </div>

                <div class="mb-3">

                    <label>Jenis Kendaraan</label>

                    <select
                        id="memberVehicle"
                        class="form-select">

                        <option value="">Pilih</option>

                        <option>Motor</option>

                        <option>Mobil</option>

                    </select>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Batal

                </button>

                <button
                    class="btn btn-success"
                    onclick="saveMember()">

                    Simpan

                </button>

            </div>

        </div>

    </div>

</div>
