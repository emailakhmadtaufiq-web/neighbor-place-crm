FILE : members.html
PART (1)
PROJECT : Neighbor Place CRM v2
========================================================== -->

<section

    id="membersPage"

    class="page"

    style="display:none;">

    <!-- ===========================================
    HEADER
    ============================================ -->

    <div

        class="d-flex

               justify-content-between

               align-items-center

               flex-wrap

               mb-4">

        <div>

            <h2 class="fw-bold mb-1">

                Members

            </h2>

            <p class="text-muted mb-0">

                Kelola seluruh data member Neighbor Place

            </p>

        </div>

        <div class="d-flex gap-2">

            <button

                class="btn btn-outline-success"

                onclick="loadMembers()">

                <i class="bi bi-arrow-repeat"></i>

                Refresh

            </button>

            <button

                class="btn btn-success"

                onclick="openMemberModal()">

                <i class="bi bi-person-plus-fill"></i>

                Tambah Member

            </button>

        </div>

    </div>

    <!-- ===========================================
    FILTER
    ============================================ -->

    <div class="table-card">

        <div class="row g-3">

            <div class="col-lg-5">

                <label class="form-label">

                    Cari Member

                </label>

                <div class="search-group">

                    <i class="bi bi-search"></i>

                    <input

                        id="searchMember"

                        class="form-control"

                        placeholder="Nama, Plat Nomor, No HP, Member ID">

                </div>

            </div>

            <div class="col-lg-3">

                <label class="form-label">

                    Level

                </label>

                <select

                    id="filterLevel"

                    class="form-select">

                    <option value="">

                        Semua Level

                    </option>

                    <option>

                        Silver

                    </option>

                    <option>

                        Gold

                    </option>

                    <option>

                        Platinum

                    </option>

                </select>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    Status

                </label>

                <select

                    id="filterStatus"

                    class="form-select">

                    <option value="">

                        Semua

                    </option>

                    <option>

                        Active

                    </option>

                    <option>

                        Inactive

                    </option>

                </select>

            </div>

            <div

                class="col-lg-2

                       d-flex

                       align-items-end">

                <button

                    class="btn btn-outline-success w-100"

                    onclick="searchMember()">

                    <i class="bi bi-funnel"></i>

                    Filter

                </button>

            </div>

        </div>

    </div>

    <!-- ===========================================
    TABLE
    ============================================ -->

    <div class="table-card">

        <div class="table-responsive">

            <table

                class="table

                       table-hover

                       align-middle">

                <thead>

                    <tr>

                        <th width="140">

                            Member ID

                        </th>

                        <th>

                            Nama

                        </th>

                        <th>

                            No HP

                        </th>

                        <th>

                            Plat Nomor

                        </th>

                        <th>

                            Kendaraan

                        </th>

                        <th width="120">

                            Level

                        </th>

                        <th width="120">

                            Status

                        </th>

                        <th width="240">

                            Action

                        </th>

                    </tr>

                </thead>

                <tbody

                    id="memberTableBody">

                </tbody>

            </table>

        </div>

    </div>
        <!-- ===========================================
    MEMBER MODAL
    ============================================ -->

    <div

        class="modal fade"

        id="memberModal"

        tabindex="-1"

        aria-hidden="true">

        <div class="modal-dialog modal-lg">

            <div class="modal-content">

                <div class="modal-header">

                    <h5

                        class="modal-title"

                        id="memberModalTitle">

                        Tambah Member

                    </h5>

                    <button

                        type="button"

                        class="btn-close"

                        data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body">

                    <div class="row g-3">

                        <div class="col-md-6">

                            <label class="form-label">

                                Nama Member

                            </label>

                            <input

                                id="memberName"

                                type="text"

                                class="form-control"

                                placeholder="Masukkan nama member">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">

                                Nomor HP

                            </label>

                            <input

                                id="memberPhone"

                                type="text"

                                class="form-control"

                                placeholder="08xxxxxxxxxx">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">

                                Plat Nomor

                            </label>

                            <input

                                id="memberPlate"

                                type="text"

                                class="form-control"

                                style="text-transform:uppercase"

                                placeholder="D 1234 ABC">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">

                                Jenis Kendaraan

                            </label>

                            <select

                                id="memberVehicle"

                                class="form-select">

                                <option value="">

                                    Pilih Kendaraan

                                </option>

                                <option>

                                    Motor

                                </option>

                                <option>

                                    Mobil

                                </option>

                            </select>

                        </div>

                    </div>

                </div>

                <div class="modal-footer">

                    <button

                        type="button"

                        class="btn btn-secondary"

                        data-bs-dismiss="modal">

                        Batal

                    </button>

                    <button

                        type="button"

                        class="btn btn-success"

                        onclick="saveMember()">

                        <i class="bi bi-floppy"></i>

                        Simpan Member

                    </button>

                </div>

            </div>

        </div>

    </div>

</section>
