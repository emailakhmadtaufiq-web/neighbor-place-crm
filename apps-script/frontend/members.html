<div id="membersPage" class="page" style="display:none;">

    <div class="content">

        <div class="topbar">

            <div>

                <h2>Members</h2>

                <small>Kelola seluruh member Neighbor Place</small>

            </div>

            <button
                class="btn btn-success"
                id="btnTambahMember">

                <i class="bi bi-plus-circle"></i>

                Tambah Member

            </button>

        </div>

        <div class="table-card">

            <div class="row mb-3">

                <div class="col-md-6">

                    <input
                        type="text"
                        id="searchMember"
                        class="form-control"

                </div>

            </div>

            <div class="table-responsive">

                <table class="table align-middle">

                    <thead>

                        <tr>

                            <th>Member ID</th>

                            <th>Nama</th>

                            <th>No HP</th>

                            <th>Plat</th>

                            <th>Kendaraan</th>

                            <th>Level</th>

                            <th width="170">

                                Aksi

                            </th>

                        </tr>

                    </thead>

                    <tbody id="memberTableBody">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
